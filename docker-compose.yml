services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cartlift}
      POSTGRES_USER: ${POSTGRES_USER:-cartlift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cartlift_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5450:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cartlift} -d ${POSTGRES_DB:-cartlift}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-not-for-prod}
      DJANGO_ALLOWED_HOSTS: "*"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      POSTGRES_DB: ${POSTGRES_DB:-cartlift}
      POSTGRES_USER: ${POSTGRES_USER:-cartlift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cartlift_dev}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost:3050,http://127.0.0.1:3050"
      DJANGO_CREATE_SUPERUSER: "1"
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@cartlift.codewithmuh.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-cartlift_admin_dev}
    ports:
      - "8050:8000"
    volumes:
      - ./api:/app

volumes:
  # Explicit name so the volume survives folder rename / compose-project changes.
  pgdata:
    name: cartlift_pgdata
