services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bandit}
      POSTGRES_USER: ${POSTGRES_USER:-bandit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bandit_dev}
    volumes:
      - bandit_pgdata:/var/lib/postgresql/data
    ports:
      - "5450:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bandit} -d ${POSTGRES_DB:-bandit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-not-for-prod}
      DJANGO_ALLOWED_HOSTS: "*"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      POSTGRES_DB: ${POSTGRES_DB:-bandit}
      POSTGRES_USER: ${POSTGRES_USER:-bandit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bandit_dev}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost:3050,http://127.0.0.1:3050"
      DJANGO_CREATE_SUPERUSER: "1"
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@bandit.dev}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-bandit_admin_dev}
    ports:
      - "8050:8000"
    volumes:
      - ./api:/app

volumes:
  bandit_pgdata:
